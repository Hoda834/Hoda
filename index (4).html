<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contact — Hoda Rezvanjoo</title>
<meta name="description" content="Get in touch with Hoda Rezvanjoo for research, consulting, or collaboration.">
<link rel="icon" href="../assets/logo.webp">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/style.css">
</head>
<body>

  <header class="hdr">
    <div class="inner">
      <a class="brand" href="../"><img src="../assets/logo.webp" alt="Hoda Rezvanjoo"><b>Hoda Rezvanjoo</b></a>
      <nav class="nav"><a href="../work/">Work</a><a href="../research/">Research</a><a href="../writing/">Writing</a><a href="../about/">About</a><a href="../contact/" class="active">Contact</a></nav>
    </div>
  </header>

  <main class="wrap">

    <section class="c-grid" style="padding:80px 0 80px 0;display:grid;grid-template-columns:1.2fr 1fr;gap:56px;align-items:start;">

      <!-- LEFT: form -->
      <div>
        <p style="font-size:13px;letter-spacing:0.12em;text-transform:uppercase;color:#E87722;font-weight:700;margin:0 0 16px 0;">Contact</p>
        <h1 style="font-family:'Crimson Pro',Georgia,'Palatino Linotype',serif;font-size:44px;line-height:1.06;letter-spacing:-0.01em;color:#1B3A5C;font-weight:600;margin:0 0 14px 0;">Get in touch</h1>
        <p style="font-size:18px;line-height:1.6;color:#1A1D21;margin:0 0 32px 0;max-width:520px;">For research, consulting, or collaboration. I read every message.</p>

        <!-- Works out of the box via mailto. To get inbox delivery without
             opening an email client, sign up at formspree.io and replace the
             action below with your form endpoint (see README). -->
        <form action="mailto:hrezvanjoo@gmail.com" method="post" enctype="text/plain" style="max-width:520px;">
          <div style="margin-bottom:18px;">
            <label class="fld" for="name">Name</label>
            <input class="inp" type="text" id="name" name="name" placeholder="Your name" required>
          </div>
          <div style="margin-bottom:18px;">
            <label class="fld" for="email">Email</label>
            <input class="inp" type="email" id="email" name="email" placeholder="you@example.com" required>
          </div>
          <div style="margin-bottom:22px;">
            <label class="fld" for="message">Message</label>
            <textarea class="inp" id="message" name="message" placeholder="How can I help?" required></textarea>
          </div>
          <button class="btn-navy" type="submit">Send message</button>
        </form>
      </div>

      <!-- RIGHT: direct links -->
      <aside style="border-left:1px solid #E7E4DE;padding-left:40px;">
        <p style="font-size:11.5px;letter-spacing:0.1em;text-transform:uppercase;color:#8A8F96;font-weight:600;margin:8px 0 6px 0;">Email</p>
        <p style="margin:0 0 26px 0;"><a href="mailto:hrezvanjoo@gmail.com" style="font-size:18px;color:#1B3A5C;text-decoration:none;border-bottom:2px solid #E87722;padding-bottom:2px;">hrezvanjoo@gmail.com</a></p>

        <p style="font-size:11.5px;letter-spacing:0.1em;text-transform:uppercase;color:#8A8F96;font-weight:600;margin:0 0 6px 0;">LinkedIn</p>
        <p style="margin:0 0 32px 0;"><a href="https://www.linkedin.com/in/hoda-rezvanjoo" style="font-size:18px;color:#1B3A5C;text-decoration:none;border-bottom:2px solid #E87722;padding-bottom:2px;">linkedin.com/in/hoda-rezvanjoo</a></p>

        <a href="../cv.pdf" style="display:inline-block;background:#E87722;color:#ffffff;font-size:16px;font-weight:600;text-decoration:none;padding:13px 26px;border-radius:4px;white-space:nowrap;">Download CV</a>
      </aside>

    </section>

  </main>

  <footer class="foot">
    <div class="inner">
      <span class="fname">Hoda Rezvanjoo</span>
      <nav class="fnav"><a href="../work/">Work</a><a href="../research/">Research</a><a href="../writing/">Writing</a><a href="../about/">About</a><a href="../contact/">Contact</a></nav>
      <span style="font-size:13px;">&copy; 2026 Hoda Rezvanjoo</span>
    </div>
  </footer>

</body>
</html>
